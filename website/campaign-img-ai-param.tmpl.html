<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Calling TP with AI parameter</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        table {
            border-collapse: collapse;
            width: calc(100% - 16px);
            table-layout: fixed;
            margin: 8px;
        }

        td {
            border: 1px solid gray;
            padding: 2px 5px;
            white-space: pre;
            vertical-align: top;
        }

        td.key {
            width: 200px;
        }
    </style>
    <script>
        function onload() {
            var ai = "MyAdvertisingId-4711";
            var tpUrl = "https://##ENVDOMAIN##/tp?ty=IM&m=campaign_demosite&c=demosite&cp_cp1=1553256932919&tp-type=html";
            tpUrl += "&ai=" + encodeURIComponent(ai);
            document.getElementById("ai").innerText = ai;
            var tpUrlElem = document.createElement("a");
            tpUrlElem.setAttribute("href", tpUrl);
            tpUrlElem.setAttribute("target", "_blank");
            tpUrlElem.innerText = tpUrl;
            document.getElementById("tpurl").appendChild(tpUrlElem);
            var mainHeight = document.getElementById("main").offsetHeight;
            mainHeight += 16;

            var ifrm = document.createElement("iframe");
            ifrm.setAttribute("src", tpUrl);
            ifrm.style.width = "100%";
            ifrm.style.height = "calc(100vh - " + mainHeight + "px)";
            ifrm.style.border = "none";
            document.body.appendChild(ifrm);
        }
    </script>
</head>
<body onload="onload()">
    <div id="main">
        <table>
            <tr><td class="key">AI (Advertising ID)</td><td id="ai"></td></tr>
            <tr><td class="key">URL</td><td id="tpurl"></td></tr>
        </table>
    </div>
    <!--
    <iframe id="" src="https://##ENVDOMAIN##/tp?ty=IM&m=campaign_demosite&c=demosite&cp_cp1=1553256932919&tp-type=html" width="100%" height="100%">
    </iframe>
    -->
</body>
</html>
