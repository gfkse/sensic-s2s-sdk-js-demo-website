<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SUI Connector Test</title>
    <script src="//##ENVDOMAIN##/sui-connector.js"></script>
    <script>
        function getCookies() {
            var cookies = {};
            if (document.cookie && document.cookie != '') {
                var split = document.cookie.split(';');
                for (var i = 0; i < split.length; i++) {
                    var name_value = split[i].split("=");
                    name_value[0] = name_value[0].replace(/^ /, '');
                    cookies[decodeURIComponent(name_value[0])] = decodeURIComponent(name_value[1]);
                }
            }
            return cookies;
        }

        function showCookies() {
            var t = document.getElementById("cookies");
            var cookies = getCookies();
            var keys = Object.keys(cookies);
            keys.sort();
            for (var k = 0; k < keys.length; k++) {
                var key = keys[k];
                var tr = document.createElement("tr");
                var td1 = document.createElement("td");
                td1.className = "key";
                td1.appendChild(document.createTextNode(key));
                var td2 = document.createElement("td");
                td2.className = "value";
                td2.appendChild(document.createTextNode(cookies[key]));
                var tr = document.createElement("tr");
                tr.appendChild(td1);
                tr.appendChild(td2);
                t.appendChild(tr);
            }
        }

        function showLS() {
            var t = document.getElementById("ls");
            var keys = [];
            for (var i = 0; i < localStorage.length; i++) {
                keys.push(localStorage.key(i));
            }
            keys.sort();
            for (var k = 0; k < keys.length; k++) {
                var key = keys[k];
                var value = localStorage.getItem(key);
                if (key === "sui") {
                    value = JSON.stringify(JSON.parse(value), null, 4);
                }
                var td1 = document.createElement("td");
                td1.className = "key";
                td1.appendChild(document.createTextNode(key));
                var td2 = document.createElement("td");
                td2.className = "value";
                td2.appendChild(document.createTextNode(value));
                var tr = document.createElement("tr");
                tr.appendChild(td1);
                tr.appendChild(td2);
                t.appendChild(tr);
            }
        }

        window.onload = function () {
            document.getElementById("date").innerHTML = new Date().toLocaleString();
            var ts0 = new Date().getTime();
            gfkConnector.init(function(userId) {
                var ts1 = new Date().getTime();
                document.getElementById("userid").innerHTML = userId;
                document.getElementById("duration").innerHTML = (ts1 - ts0) + "ms";
                showCookies();
                showLS();
                document.getElementById("additional").style.opacity = "1";
            });
        }
    </script>
    <style>
        table {
            border-collapse: collapse;
            width: 100%;
        }
        td {
            border: 1px solid gray;
            padding: 2px 5px;
            white-space: pre;
            vertical-align: top;
        }
        td.key {
            width: 200px;
        }
        h1 {
            margin: 20px 0 6px 0;
        }
        h4 {
            margin: 20px 0 2px 0;
        }
        #additional {
            opacity: 0;
            transition: opacity 2s;
        }
    </style>
</head>
<body>
    <h1>SUI Connector Test</h1>

    <table>
        <tr><td class="key">Date</td><td class="value"><span id="date">...</span></td></tr>
        <tr><td class="key">Domain</td><td class="value">##ENVDOMAIN##</td></tr>
        <tr><td class="key">User ID</td><td class="value"><span id="userid">Loading...</span></td></tr>
        <tr><td class="key">Loading time</td><td class="value"><span id="duration">...</span></td></tr>
    </table>

    <div id="additional">
        <h4>Cookies</h4>
        <table id="cookies"></table>

        <h4>Local Storage</h4>
        <table id="ls"></table>
    </div>
</body>
</html>
