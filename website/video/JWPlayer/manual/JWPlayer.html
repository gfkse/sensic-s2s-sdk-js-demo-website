<script>
  // Allow overwriting the used sdk with url param sdkUrl
  var urlParams = new URLSearchParams(window.location.search);
  var url = urlParams.get('sdkUrl') || window.env.WEB_SDK_URL;

  // Optin via GET param
  var optinGetValue = urlParams.get('optin');
  var optin = typeof optinGetValue === 'string' ? optinGetValue === 'true' : undefined;
  // optin can be set in order to override the SDKs default behavior.
  // Per default, if optin is not set, the legal bases for tracking PII will be determined automatically based on TCF2.0.
  // In order to overrive this behavior, please set optin  to true or false, depending on applicible law.
  // If optin is set to true cookies (or similar) will be set and PII will be collected.
  // If optin is set to false neither cookies (or similar) will be set nor PII will be collected.
  // Read more about privacy...https://confluence-docu.gfk.com/pages/viewpage.action?pageId=13043961
  var gfkS2sConf = {
    optin: optin,
    media: 's2s-html5-demo',
    url: url,
    type: 'WEB',
    logLevel: 'debug'
  };

  (function(w, d, c, s, id, v) {
    if (d.getElementById(id)) {
      return;
    }

    w.gfkS2sConf = c;
    w[id] = {};
    w[id].agents = [];
    var api = [
      'playStreamLive',
      'playStreamOnDemand',
      'stop',
      'skip',
      'screen',
      'volume',
      'impression'
    ];
    w.gfks = (function() {
      function f(sA, e, cb) {
        return function() {
          sA.p = cb();
          sA.queue.push({ f: e, a: arguments });
        };
      }

      function s(c, pId, cb) {
        var sA = { queue: [], config: c, cb: cb, pId: pId };
        for (var i = 0; i < api.length; i++) {
          e = api[i];
          sA[e] = f(sA, e, cb);
        }
        return sA;
      }

      return s;
    })();
    w[id].getAgent = function(cb, pId) {
      var a = {
        a: new w.gfks(
          c,
          pId || '',
          cb ||
          function() {
            return 0;
          }
        )
      };

      function g(a, e) {
        return function() {
          return a.a[e].apply(a.a, arguments);
        };
      }

      for (var i = 0; i < api.length; i++) {
        e = api[i];
        a[e] = g(a, e);
      }
      w[id].agents.push(a);
      return a;
    };

    var lJS = function(eId, url) {
      var tag = d.createElement(s);
      var el = d.getElementsByTagName(s)[0];
      tag.id = eId;
      tag.async = true;
      tag.type = 'text/javascript';
      tag.src = url;
      el.parentNode.insertBefore(tag, el);
    };

    if (c.hasOwnProperty(v)) {
      lJS(id + v, c[v]);
    }
    lJS(id, c.url);
  })(window, document, gfkS2sConf, 'script', 'gfkS2s', 'visUrl');

</script>

  // Fires when a stream has been started or is playing after having been paused or stopped
  jwPlayer.on('play', function() {
    updateVideoPosition();
    agent.playStreamOnDemand(
      'default',
      jwPlayer.getPlaylistItem().file,
      { volume: getVolume(), speed: jwPlayer.getPlaybackRate() },
      { /*please add your custom parameters here or keep empty*/ }
    );
  });


  // Event needed fot seeking; refreshing the current position 10 times every second; checking if we are in seeking mode
  jwPlayer.on('time', function() {
    if (jwPlayer.getState() === 'playing') {
      if (Math.floor(jwPlayer.getPosition() * 1000) > currentPosition && Math.abs(Math.floor(jwPlayer.getPosition() * 1000) - currentPosition) < 1000) {
        updateVideoPosition();
      }
    }
  });

  // Fires when a stream has been paused
  jwPlayer.on('pause', function() {
    agent.stop();
  });

  // Fires when a stream is idling
  jwPlayer.on('idle', function() {
    agent.stop();

  // Fires when the user starts moving/skipping to a new position in a stream
  jwPlayer.on('seek', function() {
    if (jwPlayer.getState() === 'playing') {
      agent.stop();
    }
  });

  // Fires when the mute button has been changed
  jwPlayer.on('mute', function() {
    if (jwPlayer.getState() === 'playing') {
      agent.volume(getVolume());
    }
  });

  // Fires when the volume has been changed
  jwPlayer.on('volume', function() {
    if (jwPlayer.getState() === 'playing') {
      agent.volume(getVolume());
    }
  });

  function getVolume() {
    return jwPlayer.getMute() ? '0' : Math.round(jwPlayer.getVolume()).toString();
  }

  function getVideoPosition() {
    return currentPosition;
  }

  function updateVideoPosition() {
    currentPosition = Math.floor(jwPlayer.getPosition() * 1000);
