<!DOCTYPE html>
<html>
<head>
  <meta charset='utf-8' />
  <title>S2S HTML5 Video Demo</title>
  <link rel='shortcut icon' href='../../../images/favicon.png' />
  <link rel='stylesheet' href='../../../css/s2s-demo.css' />
  <script src='../../../js/url-polyfill.js'></script>
  <script type='module' src='../../../js/optin-box.js'></script>
</head>
<body>
<script>
  // Allow overwriting the used sdk with url param sdkUrl
  var urlParams = new URLSearchParams(window.location.search);
  var url = urlParams.get('sdkUrl') || window.env.WEB_SDK_URL;

  // Optin via GET param
  var optinGetValue = urlParams.get('optin');
  var optin = typeof optinGetValue === 'string' ? optinGetValue === 'true' : undefined;
  // optin can be set in order to override the SDKs default behavior.
  // Per default, if optin is not set, the legal bases for tracking PII will be determined automatically based on TCF2.0.
  // In order to overrive this behavior, please set optin  to true or false, depending on applicible law.
  // If optin is set to true cookies (or similar) will be set and PII will be collected.
  // If optin is set to false neither cookies (or similar) will be set nor PII will be collected.
  // Read more about privacy...https://confluence-docu.gfk.com/pages/viewpage.action?pageId=13043961

  var gfkS2sConf = {
    optin: optin,
    media: 's2s-html5-demo',
    url: url,
    type: 'WEB',
    logLevel: 'debug'
  };

  (function(w, d, c, s, id, v) {
    if (d.getElementById(id)) {
      return;
    }

    w.gfkS2sConf = c;
    w[id] = {};
    w[id].agents = [];
    var api = [
      'playStreamLive',
      'playStreamOnDemand',
      'stop',
      'skip',
      'screen',
      'volume',
      'impression'
    ];
    w.gfks = (function() {
      function f(sA, e, cb) {
        return function() {
          sA.p = cb();
          sA.queue.push({ f: e, a: arguments });
        };
      }

      function s(c, pId, cb) {
        var sA = { queue: [], config: c, cb: cb, pId: pId };
        for (var i = 0; i < api.length; i++) {
          e = api[i];
          sA[e] = f(sA, e, cb);
        }
        return sA;
      }

      return s;
    })();
    w[id].getAgent = function(cb, pId) {
      var a = {
        a: new w.gfks(
          c,
          pId || '',
          cb ||
          function() {
            return 0;
          }
        )
      };

      function g(a, e) {
        return function() {
          return a.a[e].apply(a.a, arguments);
        };
      }

      for (var i = 0; i < api.length; i++) {
        e = api[i];
        a[e] = g(a, e);
      }
      w[id].agents.push(a);
      return a;
    };

    var lJS = function(eId, url) {
      var tag = d.createElement(s);
      var el = d.getElementsByTagName(s)[0];
      tag.id = eId;
      tag.async = true;
      tag.type = 'text/javascript';
      tag.src = url;
      el.parentNode.insertBefore(tag, el);
    };

    if (c.hasOwnProperty(v)) {
      lJS(id + v, c[v]);
    }
    lJS(id, c.url);
  })(window, document, gfkS2sConf, 'script', 'gfkS2s', 'visUrl');

</script>
<div class='header'>
  <div id='title'>S2S HTML5 Video Demo</div>
  <optin-box></optin-box>
</div>

<video id='my_video_id' controls preload='metadata'>
  <source src='../../../res/big_buck_bunny.mp4' type='video/mp4' />
</video>

<script>
  var script = document.createElement('script');
  script.src = `${window.env.EXTENSION_BASE_URL}/html5extension.js`;
  document.head.appendChild(script);
  script.onload = function() {
    /**
     * Initializing the extension
     * @param {string} playerID id of the player
     * @param {gfkS2s} gfkS2s configuration
     * @param {string} contentId
     * @param {object} customParams example: { cp1: '<your new cp1 value here>', cp2: '<your new cp2 value here>', ... }
     * @returns {extension}
     */
    var extension = new window.HTML5Extension('my_video_id', gfkS2s, 'default', {});

    // call setParameter() as soon as your player is switching over to different content. Otherwise, new content will be
    // reported with parameters of the video played before.
    // extension.setParameter('news', { cp1: '<your new cp1 value here>', cp2: '<your new cp2 value here>', ... });
  };
</script>
</body>
</html>
