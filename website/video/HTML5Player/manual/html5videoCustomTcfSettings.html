<script>
  // Allow overwriting the used sdk with url param sdkUrl
  var urlParams = new URLSearchParams(window.location.search);
  var url = urlParams.get('sdkUrl') || window.env.WEB_SDK_URL;
  var optinGetValue = urlParams.get('optin');
  var optinValue = typeof optinGetValue === 'string' ? optinGetValue === 'true' : undefined;
  // optin can be set in order to override the SDKs default behavior.
  // Per default, if optin is not set, the legal bases for tracking PII will be determined automatically based on TCF2.0.
  // In order to overrive this behavior, please set optin  to true or false, depending on applicible law.
  // If optin is set to true cookies (or similar) will be set and PII will be collected.
  // If optin is set to false neither cookies (or similar) will be set nor PII will be collected.
  // Read more about privacy...https://confluence-docu.gfk.com/pages/viewpage.action?pageId=13043961
  var gfkS2sConf = {
    optin: optinValue,
    media: 's2s-html5-demo',
    url: url,
    type: 'WEB',
    logLevel: 'debug'
  };

  (function(w, d, c, s, id, v) {
    if (d.getElementById(id)) {
      return;
    }

    w.gfkS2sConf = c;
    w[id] = {};
    w[id].agents = [];
    var api = [
      'playStreamLive',
      'playStreamOnDemand',
      'stop',
      'skip',
      'screen',
      'volume'
    ];
    w.gfks = (function() {
      function f(sA, e, cb) {
        return function() {
          sA.p = cb();
          sA.queue.push({ f: e, a: arguments });
        };
      }

      function s(c, pId, cb) {
        var sA = { queue: [], config: c, cb: cb, pId: pId };
        for (var i = 0; i < api.length; i++) {
          e = api[i];
          sA[e] = f(sA, e, cb);
        }
        return sA;
      }

      return s;
    })();
    w[id].getAgent = function(cb, pId) {
      var a = {
        a: new w.gfks(
          c,
          pId || '',
          cb ||
          function() {
            return 0;
          }
        )
      };

      function g(a, e) {
        return function() {
          return a.a[e].apply(a.a, arguments);
        };
      }

      for (var i = 0; i < api.length; i++) {
        e = api[i];
        a[e] = g(a, e);
      }
      w[id].agents.push(a);
      return a;
    };

    var lJS = function(eId, url) {
      var tag = d.createElement(s);
      var el = d.getElementsByTagName(s)[0];
      tag.id = eId;
      tag.async = true;
      tag.type = 'text/javascript';
      tag.src = url;
      el.parentNode.insertBefore(tag, el);
    };

    if (c.hasOwnProperty(v)) {
      lJS(id + v, c[v]);
    }
    lJS(id, c.url);
  })(window, document, gfkS2sConf, 'script', 'gfkS2s', 'visUrl');
</script>
<div class='header'>
  <div id='title'>HTML5 Custom TCF Settings</div>
</div>

<script>
  var video = document.getElementById('my_video_id');
  var agent = gfkS2s.getAgent(getVideoPosition, 'my_video_id');
  var currentPosition = getVideoPosition();
  var currentPlaybackSpeed = video.playbackRate;

  video.addEventListener('playing', () => {
    agent.playStreamOnDemand(
      'default',
      video.currentSrc,
      { volume: getVolume(), speed: currentPlaybackSpeed },
      { /** add your custom parameter here as comma-seperated <key>: "<value>" pairs */ }
    );
  });

  video.addEventListener('timeupdate', () => {
    if(!video.paused){
      currentPosition = getVideoPosition();
    }
  });

  video.addEventListener('pause', () => {
    if(video.seeking){
      agent.stop(currentPosition);
    }else{
      agent.stop();
    }
  });

  video.addEventListener('ratechange', () => {
    if (!currentPlaybackSpeed || currentPlaybackSpeed !== video.playbackRate) {
      currentPlaybackSpeed = video.playbackRate;
      if (!video.paused) {
        agent.stop();
        agent.playStreamOnDemand(
          'default',
          video.currentSrc,
          { volume: getVolume(), speed: currentPlaybackSpeed },
          {/** add your custom parameter here as comma-seperated <key>: "<value>" pairs */ }
        );
      }
    }
  });

  video.addEventListener('volumechange', () => {
    agent.volume(getVolume());
  });

  function getVolume() {
    return video.muted ? '0' : Math.round(video.volume * 100).toString();
  }

  function getVideoPosition() {
    currentPosition = Math.floor(video.currentTime * 1000);
    return currentPosition;
  }
</script>
<script src='../../../js/tcf/cmpapi.js'></script>
