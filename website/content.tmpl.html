    <script>
        // Allow overwriting the used sdk with url param sdkUrl
        var urlParams = new URLSearchParams(window.location.search);
        var url = urlParams.get("sdkUrl") || "//##ENVDOMAIN##/s2s-web.js";

        var gfkS2sConf = {
            media: "s2sdemomediaid_sst_web",
            url,
            type: "WEB"
        };
        (function (w, d, c, s, id, v) {
            if (d.getElementById(id)) {
                return;
            }

            w[id] = {};
            w[id].agents = [];
            var api = ["play", "stop", "skip", "screen", "volume", "impression"];
            w.s = (function () {
                function f(sA, e, cb) {
                    return function () {
                        sA.p = cb();
                        sA.queue.push({f: e, a: arguments});
                    };
                }
                function s(c, pId, cb) {
                    var sA = {queue: [], config: c, cb: cb, pId: pId};
                    for (var i = 0; i < api.length; i++) {
                        e = api[i];
                        sA[e] = f(sA, e, cb);
                    }
                    return sA;
                }

                return s;
            }());
            w[id].getAgent = function (cb, pId) {
                var a = {
                    a: new w.s(c, pId || "", cb || function () {
                        return 0;
                    })
                };
                function g(a, e) {
                    return function () {
                        return a.a[e].apply(a.a, arguments);
                    }
                }
                for (var i = 0; i < api.length; i++) {
                    e = api[i];
                    a[e] = g(a, e);
                }
                w[id].agents.push(a);

                return a;
            };

            var lJS = function (eId, url) {
                var tag = d.createElement(s);
                var el = d.getElementsByTagName(s)[0];
                tag.id = eId;
                tag.async = true;
                tag.type = 'text/javascript';
                tag.src = url;
                el.parentNode.insertBefore(tag, el);
            };

            if (c.hasOwnProperty(v)) {lJS(id + v, c[v]);}
            lJS(id, c.url);
        })(window, document, gfkS2sConf, 'script', 'gfkS2s', 'visUrl');

        function impressionClicked() {
            var cp1 = document.getElementById("cp1").value;
            var cp2 = document.getElementById("cp2").value;
            var cp = {};
            if (cp1 !== '') {
                cp.cp1 = cp1;
            }
            if (cp2 !== '') {
                cp.cp2 = cp2;
            }
            if (cp.hasOwnProperty("cp1") || cp.hasOwnProperty("cp2")) {
                gfkS2s.getAgent().impression('DemoContent', cp);
            } else {
                gfkS2s.getAgent().impression('DemoContent', {});
            }
        }
        gfkS2s.getAgent().impression("DemoContent", {"cp1": [
                {"i": "54534", "n": "iPhone", "b": "Apple", "c": "Smartphone"},
                {"i": "345", "n": "Adapter", "b": "Samsung", "c": "Electronic"}
            ]});
    </script>

<body>

<div id="fh5co-page">

        <div class="container">
            <div class="row">
                <div class="text-center fh5co-heading">

                    <h2>Content Tracking</h2>
                    <p>
                        MediaId = s2sdemomediaid_ss_web<br>
                    </p>
                    <p>
                        ContentId = DemoContent<br>
                    </p>
                    <h3>Custom parameters for SST</h3>
                    <p>
                        <label>cp1:</label>
                        <input type="text" value="" id="cp1"/>
                    </p>
                    <p>
                        <label>cp2:</label>
                        <input type="text" value="" id="cp2"/>
                    </p>
                    <button onclick="impressionClicked()">Track content</button>
                </div>
            </div>
        </div>
    </div>
