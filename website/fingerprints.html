<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fingerprints</title>
    <script src="//cdn.jsdelivr.net/npm/fingerprintjs2@2.1.0/dist/fingerprint2.min.js"></script>
    <style>
        table, th, td {
            border: 1px solid black;
            border-collapse: collapse;
        }
        th {
            text-align: left;
        }
        #SystemStyles {
            visibility: "hidden";
            display: "none";
        }
    </style>
</head>
<body>
    <h1>Results</h1>
    <table id="results">
        <tr>
            <th>Data point</th>
            <th>Fingerprintjs2 value</th>
        </tr>
    </table>
    <iframe id="SystemStyles" width="0" height="0" srcdoc='
        <div id="ActiveBorder" style="background-color: ActiveBorder"></div>
        <div id="ActiveCaption" style="background-color: ActiveCaption"></div>
        <div id="Background" style="background-color: Background"></div>
        <div id="ButtonText" style="background-color: ButtonText"></div>
        <div id="ThreeDHighlight" style="background-color: ThreeDHighlight"></div>
    '>
    </iframe>
    <script>
        function createSystemColorComponent(systemColorKey) {
            return (done) => {
                const { contentDocument, contentWindow } = document.getElementById("SystemStyles");
                const div = contentDocument.getElementById(systemColorKey);
                const color = contentWindow.getComputedStyle(div).getPropertyValue("background-color");
                done(color);
            }
        }
        
        const table = document.getElementById("results");
        const fp2Options = {
            excludes: {},
            extraComponents: [
                { key: "ActiveBorderColor", getData: createSystemColorComponent("ActiveBorder") },
                { key: "ActiveCaptionColor", getData: createSystemColorComponent("ActiveCaption") },
                { key: "BackgroundColor", getData: createSystemColorComponent("Background") },
                { key: "ButtonTextColor", getData: createSystemColorComponent("ButtonText") },
                { key: "ThreeDHighlightColor", getData: createSystemColorComponent("ThreeDHighlight") },
            ],
        };
        setTimeout(() => {
            Fingerprint2.get(fp2Options, components => {
                components.forEach(c => {
                    const row = table.insertRow();
                    const datapoint = row.insertCell(0);
                    datapoint.innerHTML = c.key;
                    const value = row.insertCell(1);
                    value.innerHTML = c.value;
                });
            });
        }, 500);
    </script>
</body>
</html>
