<body>

<div id="fh5co-page">
    <div id="fh5co-work-section" class="fh5co-light-grey-section">
        <div class="container">
            <div class="row">
                <div class="text-center fh5co-heading">

                    <h2>Content Tracking</h2>
                    <p>
                        MediaId = campaign_demosite<br>
                    </p>
                    <p>
                        ContentId = demosite1<br>
                    </p>
                    <h3>Custom parameters for SST</h3>
                    <p>
                        <label>cp1: timestamp</label>
                    </p>
                </div>
            </div>
            <div class="row">
                <form action="campaign-img.html">
                    <fieldset>
                        <label for="optin_true">optin true</label>
                        <input type="radio" value="true" name="optin" id="optin_true">
                        <label for="optin_false">optin false</label>
                        <input type="radio" value="false" name="optin" id="optin_false">
                        <label for="optin_undefined">optin undefined</label>
                        <input type="radio" value="" name="optin" id="optin_undefined">
                    </fieldset>
                    <fieldset>
                        <label for="noapplies">No GDPR applies</label>
                        <input type="radio" name="tcf" value="noapplies" id="noapplies">
                        <label for="consent">Gfk <b>no</b> consent</label>
                        <input type="radio" name="tcf" value="noconsent" id="noconsent">
                        <label for="legitimateInterest">Gfk consent</label>
                        <input type="radio" name="tcf" value="consent" id="consent">
                        <label for="invalid">Invalid TC String</label>
                        <input type="radio" name="tcf" value="invalid" id="invalid">
                    </fieldset>
                    <fieldset>
                        <button type="submit">Reload</button>
                    </fieldset>
                </form>
            </div>
        </div>
    </div>

    <div class="fh5co-cta" style="background-image: url(images/slide_2.jpg);">
        <div class="overlay"></div>
        <div class="container">
            <div class="col-md-12 text-center animate-box">
                <h3>Top</h3>
                <p><a href="#" class="btn btn-primary btn-outline with-arrow">Get started now! <i class="icon-arrow-right"></i></a></p>
            </div>
        </div>
    </div>


    <footer id="fh5co-footer" role="contentinfo">

        <div class="container">
            <div class="col-md-3 col-sm-12 col-sm-push-0 col-xs-12 col-xs-push-0">
                <h3>About Us</h3>
                <p>SENSIC MM Data Collection Team</p>
            </div>
            <div class="col-md-6 col-md-push-1 col-sm-12 col-sm-push-0 col-xs-12 col-xs-push-0">
            </div>
        </div>
    </footer>
</div>

<!-- GET pixel -->
<script>
    const tcStrings = {
        "consent":  "CO8nJq2O8nJq2AGABBDEA_CgAAAAAGvAAAYgF7QAQF7AZDASAByAE8ALoAXwAyAEFgIOAhABFgCUgF1AMCAYoA14B1ADyAJWAYMAyEAA.YAAAAAAAAAAA",
        "noconsent": "CO8oSTVO8oSTVAGABBDEA_CgAAAAAGvAAAYgAAAMhgJAA5ACeAF0AL4AZACCwEHAQgAiwBKQC6gGBAMUAa8A6gB5AErAMGAZCAAA.YAAAAAAAAAAA",
        "invalid": "iamnotavalidtcstring",
    }

    // Allow overwriting the used tp with url param pixelUrl
    var urlParams = new URLSearchParams(window.location.search);
    var tpUrl = urlParams.get("pixelUrl") || "https://##ENVDOMAIN##/tp";
    var optin = urlParams.get("optin");
    const tcf = urlParams.get("tcf");
    if (!/[?&]ty=/.test(tpUrl)) {
        tpUrl += (tpUrl.indexOf("?") === -1 ? "?" : "&") + "ty=IM";
    }
    if (!/[?&]m=/.test(tpUrl)) {
        tpUrl += "&m=campaign_demosite";
    }
    if (!/[?&]c=/.test(tpUrl)) {
        tpUrl += "&c=demosite";
    }
    if (!/[?&]cp_cp1=/.test(tpUrl)) {
        tpUrl += "&cp_cp1=1553256932919";
    }
    if (optin && !/[?&]optin=/.test(tpUrl)) {
        tpUrl += "&optin=" + optin;
    }
    if (tcf) {
        if (tcf === "noapplies") {
            tpUrl += "&gdpr=0";
        } else {
            tpUrl += "&gdpr=1";
            tpUrl += `&gdpr_consent=${tcStrings[tcf]}`;
        }
    }
    var pixelTag = document.createElement("img");
    pixelTag.src = tpUrl;
    document.body.appendChild(pixelTag);

    window.addEventListener("DOMContentLoaded", () => {
        (window.document.getElementById("optin_" + optin) || window.document.getElementById("optin_undefined")).checked = true;
        if (tcf) {
            window.document.getElementById(tcf).checked = true;
        }
    });
</script>

</body>
